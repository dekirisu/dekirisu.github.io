<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Overview | Dekirisu</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <button class="fixed top-4 right-[72px] z-50 w-12 h-12 rounded-2xl border-2 border-black bg-[#fafaff] flex flex-col items-center justify-between py-2 shadow-sm/30 hover:scale-[1.1] hover:rotate-5 active:scale-[0.95] transition-all cursor-pointer select-none" onclick="toggleRTX()" title="Toggle RTX" id="rtx-toggle-btn">
      <span class="font-bold text-[0.8rem] leading-none">RTX</span>
      <span class="w-6 h-3 rounded-full relative flex items-center rtx-lane"><span class="rtx-knob w-2.5 h-2.5 rounded-full absolute left-0.5 transition-all"></span></span>
    </button>
    <button class="fixed top-4 right-4 z-50 w-12 h-12 rounded-2xl border-2 border-black bg-[#fafaff] text-[1.25rem] flex items-center justify-center shadow-sm/30 hover:scale-[1.1] hover:rotate-5 active:scale-[0.95] transition-all cursor-pointer select-none" onclick="toggleDark(); this.innerHTML = document.documentElement.classList.contains('dark') ? getSunIcon() : getMoonIcon()" title="Toggle dark mode" id="dark-toggle-btn"></button>
    <app-root></app-root>
    <script>
      (function() {
        var saved = localStorage.getItem('dark-mode');
        if (saved === 'true') {
          document.documentElement.classList.add('dark');
        }
        var rtx = new URLSearchParams(window.location.search).get('rtx');
        if (rtx === 'off') {
          document.documentElement.classList.add('rtx-off');
        }
        var btn = document.getElementById('dark-toggle-btn');
        btn.innerHTML = document.documentElement.classList.contains('dark')
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="currentColor" stroke="none"/><path d="M12 2.5v2M12 19.5v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2.5 12h2M19.5 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
        var rtxBtn = document.getElementById('rtx-toggle-btn');
        var isOn = new URLSearchParams(window.location.search).get('rtx') !== 'off';
        if (isOn) {
          rtxBtn.classList.add('rtx-on');
          rtxBtn.classList.remove('rtx-off');
          rtxBtn.querySelector('.rtx-knob').style.left = '14px';
        } else {
          rtxBtn.classList.add('rtx-off');
          rtxBtn.classList.remove('rtx-on');
          rtxBtn.querySelector('.rtx-knob').style.left = '2px';
        }
      })();
    </script>
    <script>
      function toggleDark() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark'));
      }
      function getSunIcon() {
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="currentColor" stroke="none"/><path d="M12 2.5v2M12 19.5v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2.5 12h2M19.5 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      }
      function getMoonIcon() {
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      }
      function toggleRTX() {
        const url = new URL(window.location);
        var btn = document.getElementById('rtx-toggle-btn');
        var isOn = url.searchParams.get('rtx') !== 'off';
        if (isOn) {
          url.searchParams.set('rtx', 'off');
          btn.classList.remove('rtx-on');
          btn.classList.add('rtx-off');
          btn.querySelector('.rtx-knob').style.left = '2px';
        } else {
          url.searchParams.delete('rtx');
          btn.classList.remove('rtx-off');
          btn.classList.add('rtx-on');
          btn.querySelector('.rtx-knob').style.left = '14px';
        }
        window.location.href = url.toString();
      }
    </script>
    <script>
      var _g = 0;
      function damageProfile() {
        var img = document.getElementById('blur-profile-img');
        img.classList.remove('damage-shake', 'block-flash');
        void img.getBoundingClientRect();
        img.classList.add('damage-shake');
        _g++;
        var gc = _g;
        img.addEventListener('animationend', function handler() {
          if (gc === _g) { img.classList.remove('damage-shake'); img.removeEventListener('animationend', handler); }
        });
        var popup = document.createElement('div');
        popup.className = 'damage-popup';
        popup.textContent = '-1';
        popup.style.left = (30 + Math.random() * 40) + '%';
        popup.style.top = (20 + Math.random() * 40) + '%';
        var container = document.getElementById('profile-container');
        if (container) container.appendChild(popup);
        setTimeout(function() {
          popup.classList.add('show');
        }, 10);
        setTimeout(function() {
          popup.remove();
        }, 900);
      }
      function blockDamage() {
        var img = document.getElementById('blur-profile-img');
        img.classList.remove('block-flash', 'damage-shake');
        void img.getBoundingClientRect();
        img.classList.add('block-flash');
        _g++;
        var gc = _g;
        img.addEventListener('animationend', function handler() {
          if (gc === _g) { img.classList.remove('block-flash'); img.removeEventListener('animationend', handler); }
        });
        var popup = document.createElement('div');
        popup.className = 'block-popup';
        popup.textContent = 'BLOCK';
        popup.style.top = '40%';
        popup.style.left = '50%';
        popup.style.transform = 'translate(-50%, -50%)';
        var container = document.getElementById('profile-container');
        if (container) container.appendChild(popup);
        setTimeout(function() {
          popup.classList.add('show');
        }, 10);
        setTimeout(function() {
          popup.remove();
        }, 800);
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
