<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Overview | Dekirisu</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <button class="fixed top-4 right-4 z-50 w-12 h-12 rounded-2xl border-2 border-black bg-[#fafaff] text-[1.25rem] flex items-center justify-center shadow-sm/30 hover:scale-[1.1] hover:rotate-5 active:scale-[0.95] transition-all cursor-pointer select-none" onclick="toggleDark(); this.innerHTML = document.documentElement.classList.contains('dark') ? getSunIcon() : getMoonIcon()" title="Toggle dark mode" id="dark-toggle-btn"></button>
    <app-root></app-root>
    <script>
      (function() {
        var saved = localStorage.getItem('dark-mode');
        if (saved === 'true') {
          document.documentElement.classList.add('dark');
        }
        var btn = document.getElementById('dark-toggle-btn');
        btn.innerHTML = document.documentElement.classList.contains('dark')
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="currentColor" stroke="none"/><path d="M12 2.5v2M12 19.5v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2.5 12h2M19.5 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      })();
    </script>
    <script>
      function toggleDark() {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('dark-mode', document.documentElement.classList.contains('dark'));
      }
      function getSunIcon() {
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="currentColor" stroke="none"/><path d="M12 2.5v2M12 19.5v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2.5 12h2M19.5 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      }
      function getMoonIcon() {
        return '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      }
    </script>
    <script>
      function damageProfile() {
        var img = document.getElementById('profile-img');
        img.classList.add('damage-shake');
        setTimeout(function() { img.classList.remove('damage-shake'); }, 500);
        var popup = document.createElement('div');
        popup.className = 'damage-popup';
        popup.textContent = '-1';
        popup.style.left = (30 + Math.random() * 40) + '%';
        popup.style.top = (20 + Math.random() * 40) + '%';
        var container = document.getElementById('profile-container');
        if (container) container.appendChild(popup);
        setTimeout(function() {
          popup.classList.add('show');
        }, 10);
        setTimeout(function() {
          popup.remove();
        }, 900);
      }
      function blockDamage() {
        var img = document.getElementById('profile-img');
        img.classList.add('block-flash');
        setTimeout(function() { img.classList.remove('block-flash'); }, 400);
        var popup = document.createElement('div');
        popup.className = 'block-popup';
        popup.textContent = 'BLOCK';
        popup.style.top = '40%';
        popup.style.left = '50%';
        popup.style.transform = 'translate(-50%, -50%)';
        var container = document.getElementById('profile-container');
        if (container) container.appendChild(popup);
        setTimeout(function() {
          popup.classList.add('show');
        }, 10);
        setTimeout(function() {
          popup.remove();
        }, 800);
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
